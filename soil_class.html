<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Classification Report - E-JUST Lab Standards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { ejust: '#1e3a8a' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        
        html { -webkit-text-size-adjust: 100%; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; color: black !important; padding: 0 !important; }
            .report-card { border: 1px solid #d1d5db !important; box-shadow: none !important; background: white !important; }
            input { border-bottom: 2px solid #000 !important; color: black !important; }
            .dark { background-color: white !important; }
        }

        /* Bold Borders for Inputs */
        .bold-input {
            border: 2px solid #cbd5e1; /* slate-300 */
        }
        .dark .bold-input {
            border: 2px solid #475569; /* slate-600 */
        }
        .bold-input:focus {
            border-color: #1d4ed8; /* blue-700 */
            box-shadow: 0 0 0 1px #1d4ed8;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen py-4 sm:py-8 px-2 sm:px-6 lg:px-8 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div class="max-w-5xl mx-auto bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border-2 border-slate-200 dark:border-slate-800 report-card">
        
        <!-- Header Section -->
        <div class="bg-slate-900 dark:bg-black px-4 sm:px-8 py-6 border-b-4 border-blue-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight uppercase">Soil Classification Report</h1>
                <p class="text-blue-400 text-[10px] sm:text-xs font-semibold tracking-[0.15em] mt-1 uppercase">
                    AASHTO M 145 / ASTM D3282
                </p>
            </div>
            
            <div class="flex items-center justify-between w-full md:w-auto gap-4">
                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" class="no-print p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors" title="Toggle Dark Mode">
                    <svg id="sun-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
                <div class="text-right">
                    <p class="text-slate-400 text-[9px] uppercase font-bold tracking-widest leading-none">E-JUST Lab</p>
                    <p class="text-white text-[11px] font-medium leading-tight">Technical Report</p>
                </div>
            </div>
        </div>

        <!-- Metadata Section -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-4 sm:p-8 bg-slate-50/50 dark:bg-slate-800/30 border-b-2 border-slate-200 dark:border-slate-800">
            <div class="md:col-span-2">
                <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Project Description</label>
                <input type="text" id="projName" oninput="autoSaveData()" placeholder="Enter project name..." class="w-full bg-transparent border-b-2 border-slate-300 dark:border-slate-600 focus:border-blue-700 outline-none text-sm py-1 font-semibold transition-colors">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Testing Date</label>
                <input type="date" id="testDate" oninput="autoSaveData()" class="w-full bg-transparent border-b-2 border-slate-300 dark:border-slate-600 focus:border-blue-700 outline-none text-sm py-1 transition-colors">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1">Location / Boring</label>
                <input type="text" id="testLoc" oninput="autoSaveData()" placeholder="e.g. BH-01" class="w-full bg-transparent border-b-2 border-slate-300 dark:border-slate-600 focus:border-blue-700 outline-none text-sm py-1 transition-colors">
            </div>
        </div>

        <div class="p-4 sm:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Side: Laboratory Data Inputs -->
            <form id="soilForm" class="lg:col-span-6 space-y-6" onsubmit="event.preventDefault(); calculateAASHTO();">
                <div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-800 pb-2">
                    <div class="h-4 w-1 bg-blue-700"></div>
                    <h3 class="text-xs font-bold uppercase text-slate-700 dark:text-slate-300">Laboratory Test Data</h3>
                </div>
                
                <div class="overflow-hidden border-2 border-slate-200 dark:border-slate-700 rounded-lg shadow-sm">
                    <table class="w-full text-xs text-left">
                        <thead class="bg-slate-800 dark:bg-black text-slate-200 uppercase text-[9px] tracking-widest">
                            <tr>
                                <th class="p-3">Sieve / Test</th>
                                <th class="p-3 text-center">Result</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800 bg-white dark:bg-slate-900/50">
                            <tr>
                                <td class="p-3 font-semibold text-slate-600 dark:text-slate-400">% Passing No. 10</td>
                                <td class="p-2"><input type="number" id="p10" step="0.01" class="bold-input w-full text-center p-1.5 rounded outline-none font-mono font-bold text-blue-900 dark:text-blue-400 bg-transparent"></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-semibold text-slate-600 dark:text-slate-400">% Passing No. 40</td>
                                <td class="p-2"><input type="number" id="p40" step="0.01" class="bold-input w-full text-center p-1.5 rounded outline-none font-mono font-bold text-blue-900 dark:text-blue-400 bg-transparent"></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-semibold text-slate-600 dark:text-slate-400">% Passing No. 200</td>
                                <td class="p-2"><input type="number" id="p200" step="0.01" class="bold-input w-full text-center p-1.5 rounded outline-none font-mono font-bold text-blue-900 dark:text-blue-400 bg-transparent"></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-semibold text-slate-600 dark:text-slate-400 italic">Liquid Limit (LL)</td>
                                <td class="p-2"><input type="number" id="ll" step="0.01" class="bold-input w-full text-center p-1.5 rounded outline-none font-mono font-bold text-slate-700 dark:text-slate-300 bg-transparent"></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-semibold text-slate-600 dark:text-slate-400 italic">Plasticity Index (PI)</td>
                                <td class="p-2"><input type="number" id="pi" step="0.01" class="bold-input w-full text-center p-1.5 rounded outline-none font-mono font-bold text-slate-700 dark:text-slate-300 bg-transparent"></td>
                            </tr>
                        </tbody>
                    </table>
